# Flexoki (light)
#
# Source: https://github.com/kepano/flexoki (MIT)
# Homepage: https://stephango.com/flexoki
#
# This file captures the upstream palette in a comment-friendly YAML form.
# Start with palette tokens; semantic roles can evolve as we map to more tools.

meta:
  name: flexoki
  variant: light
  upstream:
    author: "Steph Ango"
    homepage: "https://stephango.com/flexoki"
    repo: "https://github.com/kepano/flexoki"
    license: "MIT"
    palette: "standard (base + accent 400/600)"

palette:
  base:
    # Lightest to darkest.
    paper: "#FFFCF0" # Warm off-white; the canonical light background.
    "50": "#F2F0E5"
    "100": "#E6E4D9"
    "150": "#DAD8CE"
    "200": "#CECDC3"
    "300": "#B7B5AC"
    "400": "#9F9D96"
    "500": "#878580"
    "600": "#6F6E69"
    "700": "#575653"
    "800": "#403E3C"
    "850": "#343331"
    "900": "#282726"
    "950": "#1C1B1A"
    black: "#100F0F" # Deep ink black; highest-contrast foreground on paper.

  accent:
    # Accent guidance (upstream):
    # - 600 series: dark accents optimized for light backgrounds (best default for light variant syntax/UI).
    # - 400 series: light accents optimized for dark backgrounds (still useful for tints/selection states).
    red:
      "400": "#D14D41"
      "600": "#AF3029"
    orange:
      "400": "#DA702C"
      "600": "#BC5215"
    yellow:
      "400": "#D0A215"
      "600": "#AD8301"
    green:
      "400": "#879A39"
      "600": "#66800B"
    cyan:
      "400": "#3AA99F"
      "600": "#24837B"
    blue:
      "400": "#4385BE"
      "600": "#205EA6"
    purple:
      "400": "#8B7EC8"
      "600": "#5E409D"
    magenta:
      "400": "#CE5D97"
      "600": "#A02F6F"

semantic:
  # Minimal semantic layer to get started.
  # As we port to tools, this section should grow into a stable set of roles.
  editor:
    background: "$palette.base.paper"
    foreground: "$palette.base.black"

  ui:
    # Suggested starting points (tweak as needed):
    # - panel backgrounds: base 50-100
    # - borders: base 150-200
    # - subtle text: base 600-700
    panelBackground: "$palette.base.50"
    border: "$palette.base.150"
    subtleText: "$palette.base.600"

  syntax:
    # For light variant, prefer 600 accents for foreground syntax tokens.
    keyword: "$palette.accent.green.600"
    string: "$palette.accent.cyan.600"
    function: "$palette.accent.orange.600"
    number: "$palette.accent.purple.600"
    variable: "$palette.accent.blue.600"
    constant: "$palette.accent.yellow.600"
    error: "$palette.accent.red.600"

